version: "3.8"

services:
  neo4j:
    image: neo4j:5.25-community
    container_name: govcon-neo4j
    ports:
      - "7474:7474" # HTTP Browser UI
      - "7687:7687" # Bolt protocol
    environment:
      # Authentication
      - NEO4J_AUTH=neo4j/govcon-capture-2025

      # Memory Configuration (adjust based on your system)
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=2G
      - NEO4J_server_memory_pagecache_size=1G

      # APOC Plugin Configuration
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true

      # Security Settings for APOC
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*

      # Performance Tuning
      - NEO4J_server_threads_worker__count=4
      - NEO4J_db_checkpoint_interval_time=15m

    volumes:
      # Data persistence (survives container restarts)
      - neo4j-data:/data
      - neo4j-logs:/logs
      - neo4j-import:/var/lib/neo4j/import
      - neo4j-plugins:/plugins

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    restart: unless-stopped

    networks:
      - govcon-network

volumes:
  neo4j-data:
    driver: local
  neo4j-logs:
    driver: local
  neo4j-import:
    driver: local
  neo4j-plugins:
    driver: local

networks:
  govcon-network:
    driver: bridge
