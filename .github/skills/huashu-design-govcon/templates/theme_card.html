<!doctype html>
<!-- Single-theme card (slide or PDF insert). -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>{{theme_short}}</title>
    <style>
      body {
        font-family: "Source Sans 3", Calibri, sans-serif;
        color: #0f172a;
        background: #f8fafc;
        margin: 0;
      }
      .card {
        padding: 48px 64px;
        max-width: 900px;
        margin: 48px auto;
        background: #fff;
        border-left: 6px solid #b8860b;
      }
      h1 {
        font-family: "Source Serif 4", Georgia, serif;
        color: #0a2540;
        font-size: 24pt;
        margin: 0 0 16px;
      }
      dt {
        color: #475569;
        text-transform: uppercase;
        font-size: 10pt;
        letter-spacing: 0.08em;
        margin-top: 18px;
      }
      dd {
        margin: 4px 0 0;
        font-size: 13pt;
      }
      .ghost {
        color: #94a3b8;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>{{theme}}</h1>
      <dl>
        <dt>Discriminator</dt>
        <dd>{{discriminator}}</dd>
        <dt>Proof Point</dt>
        <dd>{{proof}}</dd>
        <dt>Hot Button Addressed</dt>
        <dd>{{hot_button}}</dd>
        <dt class="ghost">Ghost (optional)</dt>
        <dd class="ghost">{{ghost}}</dd>
      </dl>
    </div>
  </body>
</html>
