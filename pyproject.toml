[project]
name = "govcon-capture-vibe"
version = "0.3.0"
description = "Cloud-optimized government contracting RFP analysis using RAG-Anything + LightRAG with xAI Grok"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    # Core RAG functionality (includes lightrag-hku, MinerU, and document parsers)
    "raganything[all]>=1.2.8",
    
    # Cloud LLM access (xAI Grok via OpenAI-compatible API)
    "openai>=1.0.0",
    
    # Server framework
    "fastapi>=0.118.0",
    "uvicorn>=0.37.0",
    
    # Configuration management
    "python-dotenv>=1.0.0",
    
    # Authentication (required by lightrag-hku API server)
    "PyJWT>=2.10.0",
]

# Note: raganything[all] bundles the following dependencies:
# - lightrag-hku (knowledge graph + WebUI)
# - MinerU (multimodal document parsing)
# - pypdf, python-docx, python-pptx, openpyxl (document parsers)
# - pydantic, tiktoken, nest-asyncio (utilities)
# - ollama (local LLM support)
