[project]
name = "govcon-capture-vibe"
version = "0.3.0"
description = "Cloud-optimized government contracting RFP analysis using RAG-Anything + LightRAG with xAI Grok"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    # Core RAG functionality (includes lightrag-hku, MinerU, and document parsers)
    "raganything[all]>=1.2.8",
    
    # LightRAG with RAG-Anything compatibility (REQUIRED: >= 1.4.9.7)
    # v1.4.9.7 includes:
    # - Enhanced Neo4j workspace isolation and performance
    # - APOC subgraph query optimizations for multi-depth traversal
    # - Improved connection pooling and retry logic
    # - Full-text search improvements (CJK analyzer support)
    "lightrag-hku>=1.4.9.7",
    
    # Cloud LLM access (xAI Grok via OpenAI-compatible API)
    "openai>=1.0.0",

    # xAI SDK for native Grok integration (updated to 1.5.0)
    "xai-sdk>=1.5.0",
    
    # Server framework
    "fastapi>=0.118.0",
    "uvicorn>=0.37.0",
    
    # Configuration management
    "python-dotenv>=1.0.0",
    
    # Authentication (required by lightrag-hku API server)
    "PyJWT>=2.10.0",
    
    # ============================================================================
    # GPU Acceleration for MinerU (CRITICAL for performance)
    # ============================================================================
    # PyTorch with CUDA 12.4+ support (compatible with CUDA 12.8 drivers)
    # MUST be installed from PyTorch index for GPU acceleration:
    #   uv pip install torch torchvision --index-url https://download.pytorch.org/whl/cu124
    # 
    # Without CUDA-enabled PyTorch, MinerU falls back to CPU-only processing:
    #   - CPU-only: ~5-10 minutes for 425-page RFP (SLOW)
    #   - GPU-accelerated: ~30-60 seconds for same document (2-10x faster)
    # 
    # Verify GPU is enabled after installation:
    #   python -c "import torch; print('CUDA:', torch.cuda.is_available())"
    # 
    # Note: PyPI only distributes CPU-only PyTorch by default. The torch/torchvision
    # dependencies in raganything[all] will install CPU versions. You MUST manually
    # reinstall with --index-url flag for GPU support.
    # ============================================================================
]

# Note: raganything[all] bundles the following dependencies:
# - lightrag-hku (knowledge graph + WebUI)
# - MinerU (multimodal document parsing with GPU acceleration via PyTorch)
# - pypdf, python-docx, python-pptx, openpyxl (document parsers)
# - pydantic, tiktoken, nest-asyncio (utilities)
# - ollama (local LLM support)
# - torch, torchvision (WARNING: CPU-only versions from PyPI, see GPU section above)
