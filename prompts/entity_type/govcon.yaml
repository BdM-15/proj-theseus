# GovCon JSON extraction example profile for LightRAG ENTITY_TYPE_PROMPT_FILE.
#
# LightRAG loads YAML prompt profiles from prompts/entity_type/<filename>.
# This file only externalizes JSON examples. Entity type guidance remains sourced
# from prompts/extraction/govcon_entity_types.yaml -> render_part_d() ->
# addon_params["entity_types_guidance"], which has higher precedence and carries
# richer structure than the flat file field.

entity_extraction_json_examples:
  - |
    EXAMPLE 1: Section L ↔ Section M Mapping

    Input Text:
    Section L.3.1 Technical Volume
    The Technical Volume shall address Evaluation Factors 1 and 2 (Technical Approach and Maintenance Approach) and shall not exceed 25 pages, 12-point font, Times New Roman. Include system architecture diagrams and integration plans.

    Section M: Evaluation Factors
    Factor 1: Technical Approach (Most Important, 40%)
    The Government will evaluate the offeror's understanding of technical requirements, including system architecture and integration methodology.

    Factor 2: Maintenance Approach (Significantly More Important, 30%)
    The Government will evaluate the offeror's maintenance strategy and sustainment plans.

    Output:
    {{
      "entities": [
        {{"name": "Technical Volume", "type": "proposal_instruction", "description": "The Technical Volume shall address Evaluation Factors 1 and 2 (Technical Approach and Maintenance Approach) and shall not exceed 25 pages, 12-point font, Times New Roman. Include system architecture diagrams and integration plans. Page limit: 25 pages. Format: 12pt Times New Roman."}},
        {{"name": "Factor 1 Technical Approach", "type": "evaluation_factor", "description": "Factor 1: Technical Approach (Most Important, 40%). The Government will evaluate the offeror's understanding of technical requirements, including system architecture and integration methodology. Weight: 40%. Importance: Most Important."}},
        {{"name": "Factor 2 Maintenance Approach", "type": "evaluation_factor", "description": "Factor 2: Maintenance Approach (Significantly More Important, 30%). The Government will evaluate the offeror's maintenance strategy and sustainment plans. Weight: 30%. Importance: Significantly More Important."}}
      ],
      "relationships": [
        {{"source": "Technical Volume", "target": "Factor 1 Technical Approach", "keywords": "GUIDES, golden thread, L↔M mapping", "description": "Submission instruction addresses content evaluated in this factor."}},
        {{"source": "Technical Volume", "target": "Factor 2 Maintenance Approach", "keywords": "GUIDES, golden thread, L↔M mapping", "description": "Submission instruction addresses content evaluated in this factor."}}
      ]
    }}

    ---
  - |
    EXAMPLE 2: Requirements with Criticality and Workload Drivers

    Input Text:
    [Section X.Y]. [SERVICE PROGRAM NAME] ([PROG]): The Contractor shall implement and maintain the [PROG] to support all [mission category] events and activities described in this section of the PWS. Approximately [N] customers visit all [PROG] locations on a daily basis. The Contractor shall ensure all personnel supporting the [PROG] are trained and all locations' [service stations] are always covered with no more than [M] [service station] coverage discrepancies allowed per [period]. Unless otherwise stated, the Contractor shall support the [PROG] 24 hours a day / 7 days a week.

    The Government shall provide facilities for [PROG] operations.

    Note: [SERVICE PROGRAM NAME], [N], [M], [period] are RFP-specific. This pattern applies to any 24/7 service program — fitness centers, dining facilities, help desks, motor pools, recreation programs, IT operations, etc. Teaches: parent-requirement decomposition, MEASURED_BY threshold, GFI pattern, schedule-as-workload-driver.

    Output:
    {{
      "entities": [
        {{"name": "[Section X.Y] [Service Program] Implementation", "type": "requirement", "description": "[Section X.Y]. [SERVICE PROGRAM NAME] ([PROG]): The Contractor shall implement and maintain the [PROG] to support all [mission category] events and activities. Approximately [N] customers daily. Criticality: MANDATORY. Modal verb: shall. Labor drivers: [N] customers daily, 24/7 operations."}},
        {{"name": "[Section X.Y] [Service Station] Coverage", "type": "requirement", "description": "The Contractor shall ensure all personnel supporting the [PROG] are trained and all locations' [service stations] are always covered. Criticality: MANDATORY. Modal verb: shall. Labor drivers: all locations, always covered."}},
        {{"name": "[Section X.Y] [PROG] 24/7 Support", "type": "requirement", "description": "Unless otherwise stated, the Contractor shall support the [PROG] 24 hours a day / 7 days a week. Criticality: MANDATORY. Modal verb: shall. Labor drivers: 24 hours/day, 7 days/week, continuous operations."}},
        {{"name": "[Service Station] Coverage Threshold", "type": "performance_standard", "description": "No more than [M] [service station] coverage discrepancies allowed per [period]. Threshold: no more than [M] discrepancies per [period]. Measurement: Periodic Inspection ([period])."}},
        {{"name": "Government Furnished Facilities", "type": "government_furnished_item", "description": "The Government shall provide facilities for [PROG] operations. Customer-provided facilities supporting [PROG] operations. Government-furnished asset, not contractor obligation."}}
      ],
      "relationships": [
        {{"source": "[Section X.Y] [Service Station] Coverage", "target": "[Service Station] Coverage Threshold", "keywords": "MEASURED_BY, threshold, periodic inspection", "description": "Coverage requirement is measured by discrepancy threshold."}},
        {{"source": "[Section X.Y] [Service Program] Implementation", "target": "[Parent Section]", "keywords": "CHILD_OF", "description": "[Section X.Y] requirement is contained within [Parent Section]."}},
        {{"source": "[Section X.Y] [Service Station] Coverage", "target": "[Section X.Y] [Service Program] Implementation", "keywords": "CHILD_OF", "description": "[Service station] coverage requirement is part of [Section X.Y]."}},
        {{"source": "[Section X.Y] [PROG] 24/7 Support", "target": "[Section X.Y] [Service Program] Implementation", "keywords": "CHILD_OF", "description": "24/7 support requirement is part of [Section X.Y]."}}
      ]
    }}

    ---
  - |
    EXAMPLE 3: Operational Requirements with Workload Metrics (CRITICAL EXAMPLE)

    Input Text:
    [Section X.Y.Z]. [PRIMARY FACILITY] [Service Counter]: The Contractor shall handle [product/service] sales. The Contractor shall service:
    1) One (1) [primary service counter] with [N] registers located in the [PRIMARY FACILITY].
    2) One (1) additional [overflow counter] with [N] registers during special events.
    3) One (1) additional [service counter] with [N] register located in [SECONDARY FACILITY] during special events and reserved activities.

    [Staffing constraint applies to designated registers.] The Contractor shall verify all [product] supplies necessary to ensure items are properly stocked at all times. The Contractor shall notify the Government when supply levels are low, and items need to be ordered. The Government will procure the [product] supplies. Contractor personnel shall provide services at minimum rates of [R1] customer per minute during normal operations and [R2] customers per minute during peak times ([Peak Period 1], [Peak Period 2], [Peak Period 3], [Peak Period 4]) or during special events. The Contractor shall open the [overflow counter] for special events as requested by the COR. The Government will send requests in writing a minimum of [L] calendar days prior to the event. This is estimated to occur [F] times per year.

    Note: [PRIMARY FACILITY], [R1], [R2], [F], [L], [Peak Periods] are RFP-specific. Pattern applies to any service operation with throughput requirements — food service, retail, ticketing, fitness check-in, IT help desks, vehicle dispatch. The normal/peak rate split and event-frequency driver recur across virtually every base support and facilities contract. Teaches: multi-facility configuration, normal vs. peak workload_metrics, event frequency as workload driver, REFERENCES relationship.

    Output:
    {{
      "entities": [
        {{"name": "[Section X.Y.Z] [Primary Facility] Service Counter", "type": "requirement", "description": "[Section X.Y.Z]. [PRIMARY FACILITY] [Service Counter]: The Contractor shall handle [product/service] sales. Criticality: MANDATORY. Modal verb: shall."}},
        {{"name": "[Section X.Y.Z] Service Counter Configuration", "type": "requirement", "description": "The Contractor shall service: 1) [primary service counter] with [N] registers in [PRIMARY FACILITY]. 2) [overflow counter] with [N] registers during special events. 3) [service counter] with [N] register in [SECONDARY FACILITY] during special events. Criticality: MANDATORY. Modal verb: shall. Equipment counts: [total counters], [total registers]."}},
        {{"name": "[Section X.Y.Z] Supply Verification", "type": "requirement", "description": "The Contractor shall verify all [product] supplies are properly stocked at all times and notify the Government when supply levels are low. Criticality: MANDATORY. Modal verb: shall."}},
        {{"name": "[Section X.Y.Z] Service Rate Standard", "type": "requirement", "description": "Contractor personnel shall provide services at minimum rates of [R1] customer per minute during normal operations and [R2] customers per minute during peak times ([Peak Period 1], [Peak Period 2], [Peak Period 3], [Peak Period 4]) or during special events. Criticality: MANDATORY. Modal verb: shall. Service rates: [R1] customer/minute (normal), [R2] customers/minute (peak)."}},
        {{"name": "[Section X.Y.Z] [Overflow Counter] Special Events Support", "type": "requirement", "description": "The Contractor shall open the [overflow counter] for special events as requested by the COR. Requests sent in writing [L] calendar days prior. Estimated [F] times per year. Criticality: MANDATORY. Modal verb: shall. Frequency: estimated [F] times per year. Lead time: [L] calendar days."}},
        {{"name": "Peak Service Periods", "type": "workload_metric", "description": "Peak times: [Peak Period 1], [Peak Period 2], [Peak Period 3], [Peak Period 4]. Service rate increases to [R2] customers per minute during these periods. Quantity: [R2] customers/minute. Period: peak hours."}},
        {{"name": "Special Events Frequency", "type": "workload_metric", "description": "Special events estimated to occur [F] times per year. Key workload driver for [overflow counter] operations and staffing. Quantity: [F]. Unit: events. Period: per year."}}
      ],
      "relationships": [
        {{"source": "[Section X.Y.Z] Service Rate Standard", "target": "Peak Service Periods", "keywords": "REFERENCES", "description": "Service rate requirement references peak service periods."}},
        {{"source": "[Section X.Y.Z] [Overflow Counter] Special Events Support", "target": "Special Events Frequency", "keywords": "REFERENCES", "description": "Overflow counter support requirement references event frequency."}},
        {{"source": "[Section X.Y.Z] Service Counter Configuration", "target": "[Section X.Y.Z] [Primary Facility] Service Counter", "keywords": "CHILD_OF", "description": "Counter configuration is part of the primary facility requirement."}},
        {{"source": "[Section X.Y.Z] Supply Verification", "target": "[Section X.Y.Z] [Primary Facility] Service Counter", "keywords": "CHILD_OF", "description": "Supply verification is part of [Section X.Y.Z]."}},
        {{"source": "[Section X.Y.Z] Service Rate Standard", "target": "[Section X.Y.Z] [Primary Facility] Service Counter", "keywords": "CHILD_OF", "description": "Service rate standard is part of [Section X.Y.Z]."}},
        {{"source": "[Section X.Y.Z] [Overflow Counter] Special Events Support", "target": "[Section X.Y.Z] [Primary Facility] Service Counter", "keywords": "CHILD_OF", "description": "Overflow counter support is part of [Section X.Y.Z]."}}
      ]
    }}

