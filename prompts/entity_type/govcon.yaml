    ---
  - |
    EXAMPLE 6: ANTI-PATTERN — NOT Extracting Forced Relationships

    When entities have NO semantic connection, do NOT create relationships just to connect them.

    Input (Two unrelated entities in same chunk):
    - Payment Terms (concept): "Net 30 payment terms apply to all invoices"
    - Cybersecurity Controls (requirement): "Contractor shall implement NIST 800-171 controls"

    WRONG Output (DO NOT DO THIS):
    {{
      "entities": [
        {{"name": "Payment Terms", "type": "concept", "description": "Net 30 payment terms apply to all invoices."}},
        {{"name": "Cybersecurity Controls", "type": "requirement", "description": "Contractor shall implement NIST 800-171 controls."}}
      ],
      "relationships": [
        {{"source": "Payment Terms", "target": "Cybersecurity Controls", "keywords": "RELATED_TO", "description": "Both are contract requirements."}}
      ]
    }}

    Why this is WRONG:
    - Payment terms and cybersecurity have NO semantic connection
    - Different topics, no shared keywords, no logical relationship
    - Creating such relationships dilutes the knowledge graph with noise
    - Makes semantic search less accurate

    CORRECT Output:
    {{
      "entities": [
        {{"name": "Payment Terms", "type": "concept", "description": "Net 30 payment terms apply to all invoices."}},
        {{"name": "Cybersecurity Controls", "type": "requirement", "description": "Contractor shall implement NIST 800-171 controls. Criticality: MANDATORY. Modal verb: shall."}}
      ],
      "relationships": []
    }}

    ANTI-PATTERN SIGNALS (DO NOT create relationships when):
    - Entities are in same chunk but discuss different topics
    - Only connection is "both are requirements" or "both in same section"
    - No shared domain keywords
    - No logical business or technical dependency
    - Just trying to "connect everything" without semantic justification
  - |
    EXAMPLE 7: HIGH-DENSITY EXTRACTION (Section L↔M chunk with full traceability)

    This example exists to counter under-extraction on enumerated chunks.
    It uses generic placeholder names ("Factor 1", "Subfactor 1.A", "Plan A",
    "Deliverable Tracking ID X", "FAR 52.XXX-XX") to teach the SHAPE of a
    high-density L↔M extraction, not any specific RFP. When a chunk is this
    rich, the JSON output MUST be this rich.

    Input Text:
    L.4 Volume II - Technical Volume. Offerors shall submit a Technical Volume not exceeding {{N}} pages, {{font}}, addressing Subfactors 1.A through 1.D. Subfactor 1.A (Plan A) shall include a staffing matrix listing FTEs, labor hours, and qualifications, and a mobilization schedule with critical path delivered NLT {{date}} (Deliverable Tracking ID X). Subfactor 1.B (Plan B) shall address {{N}}-day crisis continuity (limit {{M}} pages). Subfactor 1.C (Plan C) shall satisfy FAR 52.XXX-XX(h)(3) minimums. Subfactor 1.D (Plan D) shall be Task-Order-specific (Deliverable Tracking ID Y). M.2 Evaluation. Subfactor 1.A receives a combined technical/risk rating using the five-level scale (Outstanding/Good/Acceptable/Marginal/Unacceptable). Subfactors 1.B-1.D are rated Acceptable/Unacceptable; any Unacceptable renders the proposal un-awardable. Subfactor 1.A is more important than Factor 2 (Price).

    Output:
    {{
      "entities": [
        {{"name": "Volume II - Technical Volume", "type": "proposal_volume", "description": "Technical Volume submitted by offerors. Page limit: {{N}} pages. Format: {{font}}. Volume_id: II. Purpose: address Subfactors 1.A-1.D."}},
        {{"name": "L.4 Technical Volume Submission Instruction", "type": "proposal_instruction", "description": "Offerors shall submit a Technical Volume not exceeding {{N}} pages, {{font}}, addressing Subfactors 1.A through 1.D. Page_limit: {{N}}. Format_reqs: {{font}}. Modal verb: shall. Criticality: MANDATORY."}},
        {{"name": "Factor 1 - Technical", "type": "evaluation_factor", "description": "Technical evaluation factor containing four subfactors (1.A-1.D). Importance: more important than Factor 2 (Price). Subfactors: 1.A (rated tradeoff), 1.B, 1.C, 1.D (1.B-1.D are pass/fail gates)."}},
        {{"name": "Subfactor 1.A - Plan A", "type": "evaluation_factor", "description": "Tradeoff subfactor rated combined technical/risk on a five-level adjectival scale: Outstanding, Good, Acceptable, Marginal, Unacceptable. Parent_factor: Factor 1. Subfactor_number: 1.A. More important than Factor 2 Price. hierarchy_level: subfactor."}},
        {{"name": "Subfactor 1.B - Plan B", "type": "evaluation_factor", "description": "Acceptable/Unacceptable gate; Unacceptable renders proposal un-awardable. Page limit: {{M}} pages. Must address {{N}}-day crisis continuity. Parent_factor: Factor 1. Subfactor_number: 1.B. hierarchy_level: subfactor."}},
        {{"name": "Subfactor 1.C - Plan C", "type": "evaluation_factor", "description": "Acceptable/Unacceptable gate; must satisfy FAR 52.XXX-XX(h)(3) minimums. Parent_factor: Factor 1. Subfactor_number: 1.C. hierarchy_level: subfactor."}},
        {{"name": "Subfactor 1.D - Plan D", "type": "evaluation_factor", "description": "Acceptable/Unacceptable gate; must be task-order-specific (generic basic-contract plans are unacceptable). Parent_factor: Factor 1. Subfactor_number: 1.D. hierarchy_level: subfactor."}},
        {{"name": "Factor 2 - Price", "type": "evaluation_factor", "description": "Price evaluation factor. Importance: less important than Subfactor 1.A. Evaluated on Total Evaluated Price (TEP) for reasonableness and realism."}},
        {{"name": "Staffing Matrix (Plan A)", "type": "deliverable", "description": "Required content of Subfactor 1.A. Lists FTEs, labor hours, and qualifications. Submitted as part of Technical Volume."}},
        {{"name": "Mobilization Schedule with Critical Path", "type": "deliverable", "description": "Required content of Subfactor 1.A. Critical path required NLT {{date}}. Tied to Deliverable Tracking ID X."}},
        {{"name": "Deliverable Tracking ID X (Plan A)", "type": "deliverable", "description": "Deliverable tracking ID X. Plan A submitted with initial proposal and as required with CO approval prior to implementation. Must demonstrate fulfillment of task-order requirements, designate empowered on-site manager, address schedules, risks, critical path."}},
        {{"name": "Deliverable Tracking ID Y (Plan D)", "type": "deliverable", "description": "Deliverable tracking ID Y. Plan D submitted with each task-order proposal; revisions due within {{N}} calendar days after PoP start. Inspection methods, discrepancies, corrective actions documented."}},
        {{"name": "Five-Level Adjectival Rating Scale", "type": "performance_standard", "description": "Combined technical/risk rating scale: Outstanding (multiple strengths, very low risk), Good (at least one strength, low risk), Acceptable (offsetting strengths/weaknesses, moderate risk), Marginal (unoffset weaknesses, high risk), Unacceptable (one or more deficiencies, un-awardable). Used for Subfactor 1.A."}},
        {{"name": "Acceptable/Unacceptable Pass-Fail Standard", "type": "performance_standard", "description": "Binary rating used for Subfactors 1.B, 1.C, 1.D. Any Unacceptable rating renders the entire proposal un-awardable."}},
        {{"name": "FAR 52.XXX-XX (Cited Compliance Clause)", "type": "clause", "description": "Cited compliance clause referenced by Subfactor 1.C. Clause_number: 52.XXX-XX. Regulation: FAR. Subsection (h)(3) sets minimum compliance plan content."}}
      ],
      "relationships": [
        {{"source": "L.4 Technical Volume Submission Instruction", "target": "Volume II - Technical Volume", "keywords": "APPLIES_TO, submission instruction governs volume", "description": "L.4 instruction applies to the Technical Volume offerors submit."}},
        {{"source": "L.4 Technical Volume Submission Instruction", "target": "Factor 1 - Technical", "keywords": "GUIDES, instruction directs response to evaluation factor", "description": "L.4 directs offerors to address Subfactors 1.A-1.D of Factor 1."}},
        {{"source": "Subfactor 1.A - Plan A", "target": "Factor 1 - Technical", "keywords": "CHILD_OF, subfactor hierarchy", "description": "Subfactor 1.A is a child evaluation factor (hierarchy_level=subfactor) under Factor 1 Technical."}},
        {{"source": "Subfactor 1.B - Plan B", "target": "Factor 1 - Technical", "keywords": "CHILD_OF, subfactor hierarchy", "description": "Subfactor 1.B is a pass/fail child evaluation factor under Factor 1 Technical."}},
        {{"source": "Subfactor 1.C - Plan C", "target": "Factor 1 - Technical", "keywords": "CHILD_OF, subfactor hierarchy", "description": "Subfactor 1.C is a pass/fail child evaluation factor under Factor 1 Technical."}},
