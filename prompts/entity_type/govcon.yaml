  - |
    EXAMPLE 4: Equipment Inventory Tables with Location-Level Data

    Input Text (TABLE + Narrative):
    [Section X.Y.Z]. Preventive Maintenance: The Contractor shall ensure [equipment] are maintained according to the manufacturer's recommendations by performing preventive maintenance tasks. The Contractor shall perform [frequency] operational checks to ensure all [equipment] operate safely, are clean, and are in good condition.

    TABLE [X.Y]. [EQUIPMENT TYPE] LISTING, LOCATION, AND MAINTENANCE SCHEDULE:

    [TIER 1 — High Frequency, e.g. WEEKLY]:
    [Facility A]: [N] [Equipment Type 1], [N] [Equipment Type 2]
    [Facility B]: [N] [Equipment Type 1], [N] [Equipment Type 2]
    [Facility C]: [N] [Equipment Type 1], [N] [Equipment Type 2]
    [Tier 1] Machine Totals: [N] [Equipment Type 1], [N] [Equipment Type 2] ([N] total units)

    [TIER 2 — Medium Frequency, e.g. MONTHLY]:
    [Facility D]: [N] [Equipment Type 1], [N] [Equipment Type 2]
    [Facility E]: [N] [Equipment Type 1], [N] [Equipment Type 2]
    [Tier 2] Machine Totals: [N] [Equipment Type 1], [N] [Equipment Type 2] ([N] total units)

    [TIER 3 — Low Frequency, e.g. ON-CALL]:
    [Facility F]: [N] [Equipment Type 1], [N] [Equipment Type 2]
    [Facility G]: [N] [Equipment Type 1], [N] [Equipment Type 2]
    [Tier 3] Machine Totals: [N] [Equipment Type 1], [N] [Equipment Type 2] ([N] total units)

    Note: [Equipment Type], [Facility] IDs, and counts are RFP-specific. Pattern applies to any equipment-intensive contract — laundry, HVAC, ground vehicles, medical devices, IT hardware, generators, copiers. Three-tier maintenance frequency (high/medium/low or weekly/monthly/on-call) is a recurring government workload structure. Teaches: table-to-KG extraction, HAS_EQUIPMENT, facility-level granularity, APPLIES_TO from requirement to equipment inventory.

    Output:
    {{
      "entities": [
        {{"name": "Table [X.Y] [Equipment Type] Listing", "type": "document", "description": "TABLE [X.Y]. [EQUIPMENT TYPE] LISTING, LOCATION, AND MAINTENANCE SCHEDULE. Contains facility-level equipment inventory with maintenance schedule tiers."}},
        {{"name": "[Section X.Y.Z] Preventive Maintenance Requirement", "type": "requirement", "description": "[Section X.Y.Z]. Preventive Maintenance: The Contractor shall ensure [equipment] are maintained per manufacturer's recommendations with [frequency] operational checks. Criticality: MANDATORY. Modal verb: shall. Labor drivers: [frequency] checks, [Tier 1 N] units high-frequency, [Tier 2 N] units medium-frequency, [Tier 3 N] units on-call."}},
        {{"name": "[Facility A]", "type": "location", "description": "[Facility A]. Equipment counts: [N] [Equipment Type 1], [N] [Equipment Type 2] ([N] total units). Maintenance schedule: [Tier 1]."}},
        {{"name": "[Facility B]", "type": "location", "description": "[Facility B]. Equipment counts: [N] [Equipment Type 1], [N] [Equipment Type 2] ([N] total units). Maintenance schedule: [Tier 1]."}},
        {{"name": "[Facility C]", "type": "location", "description": "[Facility C]. Equipment counts: [N] [Equipment Type 1], [N] [Equipment Type 2] ([N] total units). Maintenance schedule: [Tier 1]."}},
        {{"name": "[Facility D]", "type": "location", "description": "[Facility D]. Equipment counts: [N] [Equipment Type 1], [N] [Equipment Type 2] ([N] total units). Maintenance schedule: [Tier 2]."}},
        {{"name": "[Facility E]", "type": "location", "description": "[Facility E]. Equipment counts: [N] [Equipment Type 1], [N] [Equipment Type 2] ([N] total units). Maintenance schedule: [Tier 2]."}},
        {{"name": "[Facility F]", "type": "location", "description": "[Facility F]. Equipment counts: [N] [Equipment Type 1], [N] [Equipment Type 2] ([N] total units). Maintenance schedule: [Tier 3]."}},
        {{"name": "[Facility G]", "type": "location", "description": "[Facility G]. Equipment counts: [N] [Equipment Type 1], [N] [Equipment Type 2] ([N] total units). Maintenance schedule: [Tier 3]."}},
        {{"name": "[Tier 1] Maintenance Equipment Inventory", "type": "equipment", "description": "[Tier 1] maintenance schedule equipment. Total: [N] [Equipment Type 1], [N] [Equipment Type 2] ([N] total units) across [Facilities A, B, C]."}},
        {{"name": "[Tier 2] Maintenance Equipment Inventory", "type": "equipment", "description": "[Tier 2] maintenance schedule equipment. Total: [N] [Equipment Type 1], [N] [Equipment Type 2] ([N] total units) in [Facilities D, E]."}},
